[bumpversion]
current_version = 1.4.3
commit = True
tag = True
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)((?P<prerelease>a|b|rc)(?P<prenum>\d+))?
serialize =
	{major}.{minor}.{patch}{prerelease}{prenum}
	{major}.{minor}.{patch}

[bumpversion:part:prerelease]
optional_value = stable
values =
	stable
	a
	b
	rc

[bumpversion:part:prenum]
optional_value = 0
first_value = 1

[bumpversion:file:setup.py]

[bumpversion:file:agfusion/__init__.py]

[bumpversion:file:agfusion/version.py]
